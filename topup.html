<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopUp Game Store palijah</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

select, input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

.nominal button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  cursor: pointer;
}

.nominal button:hover {
  background: #38bdf8;
  color: black;
}

.selected {
  background: #38bdf8 !important;
  color: black;
}

.checkout {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}

.checkout:hover {
  background: white;
}
</style>

</head>

<body>

<header>🎮 TOP UP ALL GAME BY SITI PALIJAH</header>

<div class="container">

  <div class="card">
    <h3>Pilih Game</h3>
    <select id="game">
      <option>Mobile Legends</option>
      <option>Free Fire</option>
      <option>PUBG Mobile</option>
      <option>Valorant</option>
    </select>

    <input type="text" id="userID" placeholder="User ID">
    <input type="text" id="serverID" placeholder="Server ID (jika ada)">
  </div>

  <div class="card">
    <h3>Pilih Nominal</h3>
    <div class="nominal">
      <button onclick="pilih('10.000')">10K</button>
      <button onclick="pilih('20.000')">20K</button>
      <button onclick="pilih('50.000')">50K</button>
      <button onclick="pilih('100.000')">100K</button>
    </div>
  </div>

  <button class="checkout" onclick="checkout()">Checkout 💳</button>

</div>

<script>
let selectedNominal = "";

function pilih(nominal) {
  selectedNominal = nominal;

  let buttons = document.querySelectorAll(".nominal button");
  buttons.forEach(btn => btn.classList.remove("selected"));

  event.target.classList.add("selected");
}

function checkout() {
  let game = document.getElementById("game").value;
  let user = document.getElementById("userID").value;
  let server = document.getElementById("serverID").value;

  if(user === "" || selectedNominal === "") {
    alert("Lengkapi data dulu!");
  } else {
    let pesan =
      "Halo, saya mau top up%0A" +
      "Game: " + game + "%0A" +
      "User ID: " + user + "%0A" +
      "Server: " + server + "%0A" +
      "Nominal: " + selectedNominal;

    window.location.href = "https://wa.me/6285198171470?text=" + pesan;
  }
}
</script>

</body>
</html>
